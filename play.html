<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Play Redirect</title>
<style>
body { font-family: Arial, sans-serif; text-align:center; background:#f0f2f5; padding:50px; }
.banner-wrapper { margin-bottom:20px; display:flex; justify-content:center; }
.play-button { padding:20px 40px; font-size:20px; background:#ff4d4f; color:white; border:none; border-radius:10px; cursor:pointer; }
.play-button:hover { background:#ff7875; }
</style>
</head>
<body>

<div id="content">
  <div class="banner-wrapper" id="adBanner"></div>
  <button class="play-button" id="playBtn">▶ Play</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>
// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyA61JEQ8eXgVqsXI9rgb0NyDaMYn3kR0sg",
  authDomain: "america1-e98d6.firebaseapp.com",
  databaseURL: "https://america1-e98d6-default-rtdb.firebaseio.com/",
  projectId: "america1-e98d6"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const playBtn = document.getElementById("playBtn");

// Ambil ID dari URL
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

if(!id){
  playBtn.style.display = "none";
  document.getElementById("adBanner").innerHTML = "<p>Link tidak valid.</p>";
} else {
  db.ref("links/"+id).once("value", snap=>{
    if(snap.exists()){
      const link = snap.val().link;
      playBtn.onclick = () => { window.location.href = link; };
    } else {
      playBtn.style.display = "none";
      document.getElementById("adBanner").innerHTML = "<p>Link tidak ditemukan.</p>";
    }
  });
}

// 🔹 Tambahkan Banner Iklan
atOptions = {
  'key' : '125333b9f9cc0e94a0b66d5a80582dd1',
  'format' : 'iframe',
  'height' : 250,
  'width' : 300,
  'params' : {}
};
var adScript = document.createElement('script');
adScript.src = "https://venisonglum.com/125333b9f9cc0e94a0b66d5a80582dd1/invoke.js";
document.getElementById("adBanner").appendChild(adScript);
</script>

</body>
</html>
